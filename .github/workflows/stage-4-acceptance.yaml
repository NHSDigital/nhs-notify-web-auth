name: "Acceptance stage"

on:
  workflow_call:
    inputs:
      build_datetime:
        description: "Build datetime, set by the CI/CD pipeline workflow"
        required: true
        type: string
      build_timestamp:
        description: "Build timestamp, set by the CI/CD pipeline workflow"
        required: true
        type: string
      build_epoch:
        description: "Build epoch, set by the CI/CD pipeline workflow"
        required: true
        type: string
      nodejs_version:
        description: "Node.js version, set by the CI/CD pipeline workflow"
        required: true
        type: string
      python_version:
        description: "Python version, set by the CI/CD pipeline workflow"
        required: true
        type: string
      terraform_version:
        description: "Terraform version, set by the CI/CD pipeline workflow"
        required: true
        type: string
      version:
        description: "Version of the software, set by the CI/CD pipeline workflow"
        required: true
        type: string

jobs:
  # sandbox-set-up:
  #   name: Sandbox set up

  #   permissions:
  #     id-token: write
  #     contents: read

  #   uses: ./.github/workflows/reusable_internal_repo_build.yaml
  #   secrets: inherit
  #   with:
  #     releaseVersion: ${{ github.head_ref || github.ref_name }}
  #     targetWorkflow: dispatch-deploy-dynamic-env.yaml
  #     targetEnvironment: pr${{ github.event.number }}
  #     targetAccountGroup: nhs-notify-iam-dev
  #     targetComponent: sandbox
  #     terraformAction: apply
  sandbox-set-up:
    name: Sandbox set up
    uses: ./.github/workflows/dispatch-deploy-dynamic-env.yaml
    with:
      infraRepoName: nhs-notify-iam-webauth
      releaseVersion: ${{ github.head_ref || github.ref_name }}
      targetEnvironment: pr${{ github.event.number }}
      targetAccountGroup: nhs-notify-iam-dev
      targetComponent: sandbox
      terraformAction: apply
  environment-set-up:
    name: "Environment set up"
    needs: sandbox-set-up
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Download sandbox terraform outputs
        uses: actions/download-artifact@v4
        with:
          name: terraform-outputs-sandbox
      - name: Display terraform output
        run: |
          cat ./terraform_output.json
      - name: "Repo setup"
        run: |
          npm ci
      - name: Generate outputs file
        run: |
          root_dir=${GITHUB_WORKSPACE}
          mv ./terraform_output.json ./sandbox_tf_outputs.json
          npm run generate-outputs file
      - name: Upload sandbox amplify_outputs.json
        uses: actions/upload-artifact@v4
        with:
          name: amplify_outputs.json
          path: ./amplify_outputs.json
  test-contract:
    name: "Contract test"
    runs-on: ubuntu-latest
    needs: environment-set-up
    timeout-minutes: 10
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4
      - name: "Run contract test"
        run: |
          make test-contract
      - name: "Save result"
        run: |
          echo "Nothing to save"
  test-security:
    name: "Security test"
    runs-on: ubuntu-latest
    needs: environment-set-up
    timeout-minutes: 10
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4
      - name: "Run security test"
        run: |
          make test-security
      - name: "Save result"
        run: |
          echo "Nothing to save"
  test-ui:
    name: "UI test"
    runs-on: ubuntu-latest
    needs: environment-set-up
    timeout-minutes: 10
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: amplify_outputs.json
      - name: "Repo setup"
        run: |
          npm ci
      - name: Install playwright browsers
        run: npx playwright install --with-deps
      - name: "Run UI test"
        run: |
          cd tests/test-team
          npm run test:local-ui


      - name: "Run UI test"
        run: |
          make test-ui
      - name: Archive UI test results
        uses: actions/upload-artifact@v4
        with:
          name: UI test report
          path: "tests/test-team/playwright-report"
  test-ui-performance:
    name: "UI performance test"
    runs-on: ubuntu-latest
    needs: environment-set-up
    timeout-minutes: 10
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4
      - name: "Run UI performance test"
        run: |
          make test-ui-performance
      - name: "Save result"
        run: |
          echo "Nothing to save"
  test-integration:
    name: "Integration test"
    runs-on: ubuntu-latest
    needs: environment-set-up
    timeout-minutes: 10
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4
      - name: "Run integration test"
        run: |
          make test-integration
      - name: "Save result"
        run: |
          echo "Nothing to save"
  test-accessibility:
    name: "Accessibility test"
    runs-on: ubuntu-latest
    needs: environment-set-up
    timeout-minutes: 10
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: amplify_outputs.json
      - name: "Repo setup"
        run: |
          npm ci
      - name: "Run accessibility test"
        run: |
          make test-accessibility
      - name: Archive accessibility results
        uses: actions/upload-artifact@v4
        with:
          name: accessibility
          path: ".reports/accessibility"
  test-load:
    name: "Load test"
    runs-on: ubuntu-latest
    needs: environment-set-up
    timeout-minutes: 10
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4
      - name: "Run load tests"
        run: |
          make test-load
      - name: "Save result"
        run: |
          echo "Nothing to save"
  # sandbox-tear-down:
  #   name: "Sandbox tear down"
  #   needs:
  #     [
  #       test-accessibility,
  #       test-contract,
  #       test-integration,
  #       test-load,
  #       test-security,
  #       test-ui-performance,
  #       test-ui,
  #     ]
  #   if: always()

  #   permissions:
  #     id-token: write
  #     contents: read

  #   uses: ./.github/workflows/reusable_internal_repo_build.yaml
  #   secrets: inherit
  #   with:
  #     releaseVersion: ${{ github.head_ref || github.ref_name }}
  #     targetWorkflow: dispatch-deploy-dynamic-env.yaml
  #     targetEnvironment: pr${{ github.event.number }}
  #     targetAccountGroup: nhs-notify-iam-dev
  #     targetComponent: sandbox
  #     terraformAction: destroy
  sandbox-tear-down:
    name: "Sandbox tear down"
    needs:
      [
        test-accessibility,
        test-contract,
        test-integration,
        test-load,
        test-security,
        test-ui-performance,
        test-ui,
      ]
    if: always()

    permissions:
      id-token: write
      contents: read

    uses: ./.github/workflows/reusable_internal_repo_build.yaml
    secrets: inherit
    with:
      infraRepoName: nhs-notify-iam-webauth
      releaseVersion: ${{ github.head_ref || github.ref_name }}
      targetEnvironment: pr${{ github.event.number }}
      targetAccountGroup: nhs-notify-iam-dev
      targetComponent: sandbox
      terraformAction: destroy
